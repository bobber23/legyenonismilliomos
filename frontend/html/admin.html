<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/admin.css" />
        <script src="../javascript/admin.js"></script>
        <title>Admin</title>
    </head>
    <body>
        <div id="main">
            <div id="navbar">
                <a class="navLogo" href="/">Legyen ön is milliomos</a>
            </div>
            <div id="content">
                <form id="newQuestion">
                    <div id="fauxFieldset">
                        <h1 id="newQuestionCim">Új kérdés</h1>
                        <div id="titleDifficultyWrapper">
                            <label id="questionTitle">
                                <p>Kérdés:</p>
                                <textarea type="text" name="question" maxlength="255"></textarea>
                            </label>
                            <label id="questionDifficulty">
                                <p>Nehézség:</p>
                                <input
                                    type="number"
                                    name="difficulty"
                                    placeholder="(1-15)"
                                    id="difficultyInput"
                                />
                            </label>
                        </div>

                        <label class="questionAnswers">
                            <p>A. válasz:</p>
                            <input type="text" name="answerA" maxlength="255" />
                        </label>
                        <label class="questionAnswers">
                            <p>B. válasz:</p>
                            <input type="text" name="answerB" maxlength="255" />
                        </label>
                        <label class="questionAnswers">
                            <p>C. válasz:</p>
                            <input type="text" name="answerC" maxlength="255" />
                        </label>
                        <label class="questionAnswers">
                            <p>D. válasz:</p>
                            <input type="text" name="answerD" maxlength="255" />
                        </label>

                        <div class="correctAnswer">
                            <p>Helyes válasz:</p>
                            <div class="correctAnswerRadioWrapper">
                                <div class="correctAnswerWrapper">
                                    <p>A</p>
                                    <input
                                        type="radio"
                                        name="correctAnswer"
                                        value="0"
                                        class="correctRadio"
                                    />
                                </div>
                                <div class="correctAnswerWrapper">
                                    <p>B</p>
                                    <input
                                        type="radio"
                                        name="correctAnswer"
                                        value="1"
                                        class="correctRadio"
                                    />
                                </div>
                                <div class="correctAnswerWrapper">
                                    <p>C</p>
                                    <input
                                        type="radio"
                                        name="correctAnswer"
                                        value="2"
                                        class="correctRadio"
                                    />
                                </div>
                                <div class="correctAnswerWrapper">
                                    <p>D</p>
                                    <input
                                        type="radio"
                                        name="correctAnswer"
                                        value="3"
                                        class="correctRadio"
                                    />
                                </div>
                            </div>
                        </div>
                        <input type="button" value="Hozzáadás" id="addQuestionBtn" />
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
